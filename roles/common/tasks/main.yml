---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Upgrade all packages to latest
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true
  become: true

- name: Install required packages
  ansible.builtin.apt:
    name: "{{ common_required_packages }}"
    state: present
  become: true

- name: Set timezone to UTC
  community.general.timezone:
    name: UTC
  become: true
  notify: Restart cron

- name: Set hostname
  ansible.builtin.hostname:
    name: "devops-project3-vm"
  become: true

- name: Create application user
  ansible.builtin.user:
    name: appuser
    shell: /bin/bash
    groups: sudo
    append: true
    state: present
    create_home: true
  become: true

- name: Ensure /opt/app directory exists
  ansible.builtin.file:
    path: /opt/app
    state: directory
    owner: appuser
    group: appuser
    mode: '0755'
  become: true

- name: Print common role completed
  ansible.builtin.debug:
    msg: "✅ Common configuration completed on {{ inventory_hostname }}"
