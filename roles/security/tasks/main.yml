---
- name: Enable UFW firewall
  community.general.ufw:
    state: enabled
    policy: deny
  become: true

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
  become: true

- name: Allow HTTP through UFW
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
  become: true

- name: Allow HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
  become: true

- name: Allow App Port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ app_port }}"
    proto: tcp
  become: true

- name: Enable fail2ban service
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
  become: true

- name: Configure fail2ban for SSH
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantiime = 3600
      findtime = 600
      maxretry = 3

      [sshd]
      enabled = true
      port = ssh
      logpath = %(sshd_log)s
      backend = %(syslog_backend)s
    mode: '0644'
  become: true
  notify: Restart fail2ban
    
- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'
    state: present
  become: true
  notify: Restart SSH

- name: Disable password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
  become: true
  notify: Restart SSH

- name: Set SSH MaxAuthTries
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^MaxAuthTries'
    line: 'MaxAuthTries 3'
    state: present
  become: true
  notify: Restart SSH

- name: Print security role completed
  ansible.builtin.debug:
    msg: "✅ Security hardening completed on {{ inventory_hostname }}"
